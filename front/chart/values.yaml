# Default values for accounting-front
replicaCount: 1

# maxSurge: 0 = don't create a second pod; terminates old first (for small nodes)
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

image:
  repository: 188.132.232.168:30836/accounting-front
  pullPolicy: IfNotPresent
  tag: "2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1001

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  annotations: {}

# Prometheus Metrics Configuration
metrics:
  enabled: false
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: ns-xp45-default-accounting-front.bugx.ir
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: accounting-front-tls
      hosts:
        - ns-xp45-default-accounting-front.bugx.ir

resources:
  limits:
    cpu: 100m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment Variables
# NOTE: NEXT_PUBLIC_API_BASE_URL is baked into the image at docker build time.
# Rebuild the front image with --build-arg when changing the public API URL.
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: HOSTNAME
    value: "0.0.0.0"
  - name: NEXT_TELEMETRY_DISABLED
    value: "1"

# ConfigMap for additional configuration
configMap:
  enabled: false
  data: {}

# Secrets for sensitive data (optional)
secrets:
  enabled: false
  data: {}

# Liveness and Readiness Probes
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Additional volumes
volumes: []

volumeMounts: []

# Init containers
initContainers: []

# Sidecar containers
sidecars: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
