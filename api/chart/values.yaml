# Default values for accounting-api
replicaCount: 1

# maxSurge: 0 = don't create a second pod; terminates old first (for small nodes)
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

image:
  repository: 188.132.232.168:30836/accounting-api
  pullPolicy: IfNotPresent
  tag: "5"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 10001

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}
  # Needed when pod Ready condition never becomes True (e.g. vCluster status sync)
  publishNotReadyAddresses: true

# Prometheus Metrics Configuration
metrics:
  enabled: false
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: ns-xp45-default-accounting-api.bugx.ir
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: accounting-api-tls
      hosts:
        - ns-xp45-default-accounting-api.bugx.ir

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment Variables
# Sensitive values can alternatively use valueFrom + secrets.enabled
env:
  - name: APP_ENV
    value: "prod"
  - name: APP_PORT
    value: "8080"
  - name: APP_CORS_ORIGIN
    value: "https://ns-xp45-default-accounting-front.bugx.ir,https://ns-xp45-default-accounting-web.bugx.ir"
  - name: TZ
    value: "Asia/Tehran"
  - name: MYSQL_DSN
    value: "root:secret123@tcp(mysql-headless:3306)/accounting?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci&multiStatements=true"
  - name: JWT_SECRET
    value: "change-me-in-production"
  # Example: load from Secret instead of plain value
  # - name: MYSQL_DSN
  #   valueFrom:
  #     secretKeyRef:
  #       name: accounting-api
  #       key: MYSQL_DSN
  # - name: JWT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: accounting-api
  #       key: JWT_SECRET

# ConfigMap for additional configuration
configMap:
  enabled: false
  data: {}

# Secrets for sensitive data (optional; wire via env valueFrom)
secrets:
  enabled: false
  mysqlDsn: "root:secret123@tcp(mysql-headless:3306)/accounting?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci&multiStatements=true"
  jwtSecret: "change-me-in-production"

# Probes (disabled — set enabled: true to turn on)
probes:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Additional volumes
volumes: []

volumeMounts: []

# Init containers
initContainers: []

# Sidecar containers
sidecars: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
