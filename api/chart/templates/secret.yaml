{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_DSN: {{ .Values.secret.MYSQL_DSN | quote }}
  JWT_SECRET: {{ .Values.secret.JWT_SECRET | quote }}
{{- end }}
