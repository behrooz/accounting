<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="description" content="مشاهده و خرید محصولات فروشگاه آبرنگ. فیلتر بر اساس دسته‌بندی، قیمت و حراج." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://abrangstyle.ir/shop.html" />
  <meta property="og:locale" content="fa_IR" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="آبرنگ" />
  <meta property="og:title" content="فروشگاه | آبرنگ" />
  <meta property="og:description" content="مشاهده و خرید محصولات فروشگاه آبرنگ. فیلتر بر اساس دسته‌بندی، قیمت و حراج." />
  <meta property="og:url" content="https://abrangstyle.ir/shop.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="فروشگاه | آبرنگ" />
  <meta name="twitter:description" content="مشاهده و خرید محصولات فروشگاه آبرنگ. فیلتر بر اساس دسته‌بندی، قیمت و حراج." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23c41e3a'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='28' fill='white' font-family='Tahoma'%3Eآ%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.cdnfonts.com/css/iranyekan" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=28" />
</head>
<body class="page-shop">
  <header class="site-header" id="siteHeader">
    <div class="header-bar">
      <div class="header-side header-side-start">
        <button class="icon-btn menu-toggle" id="menuToggle" type="button" aria-label="منو">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <button class="icon-btn" id="searchToggle" type="button" aria-label="جستجو">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <a class="brand-logo" href="index.html">آبرنگ</a>

      <div class="header-side header-side-end">
        <a class="icon-btn" href="account.html" aria-label="حساب کاربری">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.2"/><path d="M5 19c1.8-3.2 4-4.8 7-4.8s5.2 1.6 7 4.8" stroke-linecap="round"/></svg>
        </a>
        <button class="icon-btn cart-btn" id="cartToggle" type="button" aria-label="سبد خرید">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 7h12l-1.1 12.2a1 1 0 01-1 .8H8.1a1 1 0 01-1-.8L6 7z"/><path d="M9 7V6a3 3 0 016 0v1" stroke-linecap="round"/></svg>
          <span class="badge-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <aside class="menu-drawer" id="menuDrawer" aria-hidden="true">
    <div class="menu-drawer-panel">
      <form class="menu-search" action="shop.html" method="get">
        <input type="search" name="q" id="shopSearchInput" placeholder="کد یا اسم محصول را جستجو کنید" autocomplete="off" />
        <button type="submit" aria-label="جستجو">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg>
        </button>
      </form>

      <div class="menu-panel is-active">
        <a class="menu-link" href="index.html">خانه</a>
        <a class="menu-link is-active" href="shop.html">فروشگاه</a>
        <a class="menu-link menu-link-sale" href="shop.html#sale">
          <span>حراج</span>
          <span class="sale-dot" aria-hidden="true"></span>
        </a>
        <div class="menu-cats" id="menuCategories"></div>
        <a class="menu-link" href="about.html">درباره ما</a>
        <a class="menu-link" href="contact.html">تماس با ما</a>
        <a class="menu-link has-icon" href="account.html">
          <span>ورود / ثبت نام</span>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.2"/><path d="M5 19c1.8-3.2 4-4.8 7-4.8s5.2 1.6 7 4.8" stroke-linecap="round"/></svg>
        </a>
      </div>
    </div>
  </aside>

  <main class="shop-page">
    <div class="shop-meta">
      <nav class="shop-breadcrumb" aria-label="مسیر">
        <a href="index.html">خانه</a>
        <span>/</span>
        <span id="shopCrumbCurrent">فروشگاه</span>
      </nav>
      <h1 class="shop-title" id="shopTitle">فروشگاه</h1>
      <p class="shop-result-count" id="shopResultCount">در حال بارگذاری…</p>
    </div>

    <div class="shop-actions">
      <button type="button" class="shop-action-btn" id="shopFilterBtn" aria-haspopup="dialog">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <path d="M4 6h16M7 12h10M10 18h4" stroke-linecap="round"/>
        </svg>
        <span>فیلترهای جستجو</span>
      </button>
      <button type="button" class="shop-action-btn shop-sort-btn" id="shopSortBtn" aria-label="مرتب‌سازی" aria-haspopup="dialog">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <path d="M8 4v16M5 7l3-3 3 3M16 20V4M13 17l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <input type="hidden" id="sortFilter" value="new" />

    <div class="product-grid" id="shopProducts"></div>
    <p class="empty-state" id="shopEmpty" hidden>محصولی پیدا نشد.</p>
  </main>

  <!-- Sort sheet -->
  <div class="shop-sheet" id="shopSortSheet" hidden>
    <div class="shop-sheet-backdrop" data-close-sheet></div>
    <div class="shop-sheet-panel" role="dialog" aria-label="مرتب‌سازی">
      <div class="shop-sheet-head">
        <h2>مرتب‌سازی</h2>
        <button type="button" class="shop-sheet-close" data-close-sheet aria-label="بستن">×</button>
      </div>
      <div class="shop-sheet-body shop-sort-options">
        <button type="button" class="shop-sort-option is-active" data-sort="new">جدیدترین</button>
        <button type="button" class="shop-sort-option" data-sort="price-asc">ارزان‌ترین</button>
        <button type="button" class="shop-sort-option" data-sort="price-desc">گران‌ترین</button>
        <button type="button" class="shop-sort-option" data-sort="sale">حراج</button>
      </div>
    </div>
  </div>

  <!-- Filter sheet -->
  <div class="shop-sheet" id="shopFilterSheet" hidden>
    <div class="shop-sheet-backdrop" data-close-sheet></div>
    <div class="shop-sheet-panel" role="dialog" aria-label="فیلترهای جستجو">
      <div class="shop-sheet-head">
        <h2>فیلترهای جستجو</h2>
        <button type="button" class="shop-sheet-close" data-close-sheet aria-label="بستن">×</button>
      </div>
      <div class="shop-sheet-body">
        <p class="shop-filter-label">دسته‌بندی</p>
        <div class="shop-filter-cats" id="shopFilterCats">
          <a href="shop.html" class="shop-filter-cat is-active" data-all="1">همه محصولات</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="siteFooter"></footer>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-drawer-panel">
      <div class="cart-drawer-head">
        <span class="cart-head-spacer" aria-hidden="true"></span>
        <h2>سبد خرید</h2>
        <button type="button" class="cart-close-btn" id="cartClose" aria-label="بستن">
          <span aria-hidden="true">×</span>
          <span>بستن</span>
        </button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>جمع جزء:</span>
          <strong id="cartTotal">۰ تومان</strong>
        </div>
        <button type="button" class="btn-cart btn-cart-dark" id="cartContinue">ادامه خرید</button>
        <a class="btn-cart btn-cart-outline" href="shop.html">مشاهده سبد</a>
        <button type="button" class="btn-cart btn-cart-red" id="cartCheckout">ثبت سفارش</button>
      </div>
    </div>
  </aside>
  <div class="overlay" id="overlay" hidden></div>

  <nav class="bottom-nav" aria-label="منوی پایین">
    <a href="shop.html" class="bottom-nav-item is-active">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21h6" stroke-linecap="round"/><path d="M8 12h8" stroke-linecap="round"/></svg>
      <span>فروشگاه</span>
    </a>
    <a href="index.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 11l8-7 8 7"/><path d="M6 10.5V20h12v-9.5"/></svg>
      <span>خانه</span>
    </a>
    <button type="button" class="bottom-nav-item" id="dockCart">
      <span class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 8h10l-1 12H8L7 8z"/><path d="M9 8a3 3 0 016 0" stroke-linecap="round"/><path d="M9 12h6M9 16h6" stroke-linecap="round"/></svg>
        <span class="badge-count dock-badge" id="dockCartCount">0</span>
      </span>
      <span>سبد خرید</span>
    </button>
    <a href="account.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.2"/><path d="M5 19c1.8-3.2 4-4.8 7-4.8s5.2 1.6 7 4.8" stroke-linecap="round"/></svg>
      <span>حساب من</span>
    </a>
    <button type="button" class="bottom-nav-item" id="dockMenu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      <span>منو</span>
    </button>
  </nav>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="js/runtime-config.js?v=12"></script>
  <script src="js/config.js?v=29"></script>
  <script src="js/data.js?v=12"></script>
  <script src="js/auth.js?v=23"></script>
  <script src="js/main.js?v=29"></script>
</body>
</html>
