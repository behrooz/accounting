server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static storefront — serve exact files only (no SPA fallback)
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache hashed/static assets lightly
    location /css/ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location /js/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Do not cache runtime API config
    location = /js/runtime-config.js {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location = /health {
        default_type application/json;
        return 200 '{"ok":true}';
    }
}
