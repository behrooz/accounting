name: Build and Push API

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-build-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."188.132.232.168:30836"]
              http = true
              insecure = true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            188.132.232.168:30836/accounting-api:${{ github.run_number }}
            188.132.232.168:30836/accounting-api:latest
          cache-from: type=registry,ref=188.132.232.168:30836/accounting-api:latest
          cache-to: type=inline

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update deployment image and rollout
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          DEPLOYMENT_NAME="${K8S_DEPLOYMENT_NAME:-accounting-api}"
          CONTAINER_NAME="${K8S_CONTAINER_NAME:-accounting-api}"
          IMAGE_TAG="${{ github.run_number }}"
          IMAGE_NAME="188.132.232.168:30836/accounting-api:${IMAGE_TAG}"

          echo "Updating deployment ${DEPLOYMENT_NAME} in namespace ${NAMESPACE}"
          echo "Container: ${CONTAINER_NAME}"
          echo "New image: ${IMAGE_NAME}"

          kubectl set image deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}=${IMAGE_NAME} \
            -n ${NAMESPACE}

          kubectl rollout restart deployment/${DEPLOYMENT_NAME} -n ${NAMESPACE}

          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/${DEPLOYMENT_NAME} -n ${NAMESPACE} --timeout=5m

          echo "✅ API rollout completed successfully!"
          echo "New image tag: ${IMAGE_TAG}"
        env:
          K8S_NAMESPACE: ${{ secrets.API_K8S_NAMESPACE || secrets.K8S_NAMESPACE || 'default' }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.API_K8S_DEPLOYMENT_NAME || 'accounting-api' }}
          K8S_CONTAINER_NAME: ${{ secrets.API_K8S_CONTAINER_NAME || 'accounting-api' }}
