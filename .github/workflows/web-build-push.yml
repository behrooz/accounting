name: Build and Push Web

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-build-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."45.94.214.130:30836"]
              http = true
              insecure = true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          provenance: false
          sbom: false
          # Registry only accepts Docker schema2 (not OCI) manifests
          tags: |
            45.94.214.130:30836/accounting-web:${{ github.run_number }}
          outputs: type=image,push=true,oci-mediatypes=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          IMAGE_TAG="${{ github.run_number }}"
          API_BASE_URL="${ABERANG_API_BASE_URL:-https://ns-xp45-default-accounting-api.bugx.ir/api}"

          echo "Upgrading accounting-web with image tag ${IMAGE_TAG}"

          # Do not use --wait: pods in this cluster never get Ready=True
          # (vCluster status sync), so Helm would always time out.
          helm upgrade --install accounting-web ./web/chart \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set image.tag="${IMAGE_TAG}" \
            --set env[0].name=ABERANG_API_BASE_URL \
            --set-string env[0].value="${API_BASE_URL}" \
            --server-side=false

          echo "Waiting for pod to be Running..."
          kubectl -n "${NAMESPACE}" rollout status deployment/accounting-web --timeout=3m || true
          kubectl -n "${NAMESPACE}" get pods -l app.kubernetes.io/name=accounting-web -o wide

          echo "✅ Web upgrade submitted (image tag: ${IMAGE_TAG})"
        env:
          K8S_NAMESPACE: ${{ secrets.WEB_K8S_NAMESPACE || secrets.K8S_NAMESPACE || 'default' }}
          ABERANG_API_BASE_URL: ${{ vars.ABERANG_API_BASE_URL || vars.NEXT_PUBLIC_API_BASE_URL || 'https://ns-xp45-default-accounting-api.bugx.ir/api' }}
