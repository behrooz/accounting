name: Build and Push Front

on:
  push:
    branches:
      - main
    paths:
      - "front/**"
      - ".github/workflows/front-build-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."188.132.232.168:30836"]
              http = true
              insecure = true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080/api' }}
          tags: |
            188.132.232.168:30836/accounting-front:${{ github.run_number }}
            188.132.232.168:30836/accounting-front:latest
          cache-from: type=registry,ref=188.132.232.168:30836/accounting-front:latest
          cache-to: type=inline

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade and wait for rollout
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          IMAGE_TAG="${{ github.run_number }}"

          echo "Upgrading accounting-front with image tag ${IMAGE_TAG}"

          helm upgrade --install accounting-front ./front/chart \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set image.tag="${IMAGE_TAG}" \
            --force-conflicts \
            --wait \
            --timeout 5m

          echo "✅ Front rollout completed successfully!"
          echo "New image tag: ${IMAGE_TAG}"
        env:
          K8S_NAMESPACE: ${{ secrets.FRONT_K8S_NAMESPACE || secrets.K8S_NAMESPACE || 'default' }}
