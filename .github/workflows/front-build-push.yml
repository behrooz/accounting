name: Build and Push Front

on:
  push:
    branches:
      - main
    paths:
      - "front/**"
      - ".github/workflows/front-build-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."188.132.232.168:30836"]
              http = true
              insecure = true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://ns-xp45-default-accounting-api.bugx.ir/api' }}
          tags: |
            188.132.232.168:30836/accounting-front:${{ github.run_number }}
            188.132.232.168:30836/accounting-front:latest
          cache-from: type=registry,ref=188.132.232.168:30836/accounting-front:latest
          cache-to: type=inline

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          IMAGE_TAG="${{ github.run_number }}"

          echo "Upgrading accounting-front with image tag ${IMAGE_TAG}"

          # Do not use --wait: pods in this cluster never get Ready=True
          # (vCluster status sync), so Helm would always time out.
          helm upgrade --install accounting-front ./front/chart \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set image.tag="${IMAGE_TAG}" \
            --server-side=false

          echo "Waiting for pod to be Running..."
          kubectl -n "${NAMESPACE}" rollout status deployment/accounting-front --timeout=3m || true
          kubectl -n "${NAMESPACE}" get pods -l app.kubernetes.io/name=accounting-front -o wide

          echo "✅ Front upgrade submitted (image tag: ${IMAGE_TAG})"
        env:
          K8S_NAMESPACE: ${{ secrets.FRONT_K8S_NAMESPACE || secrets.K8S_NAMESPACE || 'default' }}
